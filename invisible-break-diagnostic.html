</style>

<script>

  commitment: {
    Instinct: "List every active initiative. Force-rank them. Pick the top 2\u20133 and explicitly defund or pause the rest. This will be the hardest and most valuable thing you do this quarter.",
    Transition: "Create a visible commitment filter: before any new initiative gets resources, it must be evaluated against your current top bets. Make this a leadership team norm, not just a conversation.",
    System: "Keep the discipline. Review your bets quarterly. The risk at this stage isn\u2019t lack of focus \u2014 it\u2019s complacency. Make sure your bets are still the right ones."
  },
  alignment: {
    Instinct: "Start with three shared decision criteria that every significant choice should run through. Communicate them repeatedly until the team can recite them without prompting.",
    Transition: "Audit recent decisions made below the leadership level. Where alignment broke, diagnose whether the issue was unclear criteria or lack of communication. Fix the specific gap.",
    System: "Invest in onboarding and reinforcement. Your systems work \u2014 make sure new hires absorb them quickly. The biggest risk is dilution as headcount grows."
  },
  intelligence: {
    Instinct: "Block 90 minutes monthly for your leadership team to discuss one external question: what\u2019s changing in our market that could affect our assumptions? Start the habit before you optimize it.",
    Transition: "Assign someone to own a simple market scan \u2014 even a monthly summary of customer feedback patterns, competitor moves, and industry signals. Structure beats sporadic attention.",
    System: "Connect your intelligence to your planning. The value isn\u2019t in knowing what\u2019s changing \u2014 it\u2019s in adjusting your bets before the change forces you to."
  }
};

// ---- STATE ----
let phase = "intro";
let currentCat = 0;
let currentQ = 0;
let answers = {};
let emailSubmitted = false;
let shareCopied = false;

function getStageLabel(avg) {
  if (avg <= 2.33) return "Instinct";
  if (avg <= 3.66) return "Transition";
  return "System";
}

function getCategoryScore(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const scores = cat.questions.map(q => answers[q.id]).filter(Boolean);
  if (scores.length === 0) return 0;
  return scores.reduce((a, b) => a + b, 0) / scores.length;
}

function answeredCount() { return Object.keys(answers).length; }
function globalIndex() { return currentCat * 3 + currentQ; }

// ---- RENDER ----
function render() {
  const app = document.getElementById("app");
  if (phase === "intro") app.innerHTML = renderIntro();
  else if (phase === "questions") app.innerHTML = renderQuestions();
  else if (phase === "results") app.innerHTML = renderResults();
  bindEvents();
}

function renderIntro() {
  return `
    <div class="screen-intro">
      <div class="intro-wrap">
        <div class="intro-brand sans">Carter Reports</div>
        <h1 class="intro-title">How Scalable Is<br>Your Strategy?</h1>
        <div class="intro-subtitle sans">The Invisible Break Diagnostic</div>
        <div class="intro-rule"></div>
        <p class="intro-desc">12 questions. Four categories. A clear picture of whether your strategy is ready for the next phase of growth \u2014 or quietly breaking under the weight of it.</p>
        <p class="intro-audience">Built for founders and leadership teams at companies between $2M and $15M in revenue.</p>
        <button class="btn-primary sans" data-action="start">Begin Diagnostic</button>
        <div class="intro-time sans">Takes approximately 4 minutes</div>
      </div>
    </div>`;
}

function renderQuestions() {
  const cat = CATEGORIES[currentCat];
  const q = cat.questions[currentQ];
  const gi = globalIndex();
  const ac = answeredCount();
  const pct = (ac / 12) * 100;

  let dots = "";
  CATEGORIES.forEach((c, ci) => {
    let group = '<div class="dot-group">';
    c.questions.forEach((qu, qi) => {
      const idx = ci * 3 + qi;
      let cls = "dot";
      if (idx === gi) cls += " current";
      else if (answers[qu.id]) cls += " answered";
      group += `<div class="${cls}"></div>`;
    });
    group += "</div>";
    dots += group;
  });

  let answerHtml = "";
  q.anchors.forEach((anchor, i) => {
    const val = i + 1;
    const sel = answers[q.id] === val ? " selected" : "";
    answerHtml += `
      <button class="answer-btn${sel}" data-action="answer" data-value="${val}">
        <div class="answer-num sans">${val}</div>
        <span class="answer-text">${anchor}</span>
      </button>`;
  });

  const backBtn = gi > 0
    ? '<button class="btn-back sans" data-action="back">\u2190 Previous question</button>'
    : "";

  return `
    <div class="screen-questions">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="q-header">
        <div class="q-brand sans">Carter Reports</div>
        <div class="q-count sans">${ac} of 12</div>
      </div>
      <div class="q-main">
        <div class="q-content" id="qContent">
          <div class="cat-label">
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-title sans">${cat.title}</span>
          </div>
          <div class="cat-subtitle">${cat.subtitle}</div>
          <h2 class="q-text">${q.text}</h2>
          <div class="answer-list">${answerHtml}</div>
          ${backBtn}
          <div class="dots">${dots}</div>
        </div>
      </div>
    </div>`;
}

function renderResults() {
  let cardsHtml = "";

  CATEGORIES.forEach(cat => {
    const avg = getCategoryScore(cat.id);
    const stage = getStageLabel(avg);
    const stageLower = stage.toLowerCase();
    const desc = STAGE_DESCRIPTIONS[cat.id][stage];
    const action = ACTION_ITEMS[cat.id][stage];
    const stageColors = { instinct: "#c44", transition: "#b68a1a", system: "#2a7d4f" };
    const color = stageColors[stageLower];

    cardsHtml += `
      <div class="result-card" style="border-left: 3px solid ${color}">
        <div class="result-card-header">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="result-cat-icon" style="color:${color}">${cat.icon}</span>
              <span class="result-cat-title sans">${cat.title}</span>
            </div>
          </div>
          <div class="stage-badge ${stageLower} sans">${stage}</div>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar-zone" style="left:33.3%"></div>
          <div class="score-bar-zone" style="left:66.6%"></div>
          <div class="score-bar-fill ${stageLower}" style="width:${(avg/5)*100}%"></div>
        </div>
        <p class="result-desc">${desc}</p>
        <div class="next-step-box">
          <div class="next-step-label sans">Next Step</div>
          <p class="next-step-text">${action}</p>
        </div>
      </div>`;
  });

  const emailSection = `<div style="display:flex;justify-content:center;margin:0 auto;">
        <a href="https://subscribe-forms.beehiiv.com/76c854ba-da03-4fc6-b241-d975052c3095" target="_blank" rel="noopener noreferrer" style="display:inline-block;background:linear-gradient(135deg,#3d7a9c,#4a8db5);color:#fff;border:none;padding:14px 36px;font-size:15px;font-family:'Trebuchet MS','Lucida Sans',sans-serif;letter-spacing:0.08em;border-radius:4px;text-decoration:none;box-shadow:0 4px 20px rgba(74,141,181,0.25);transition:all 0.3s ease;">Subscribe &amp; Get the Framework PDF</a>
      </div>`;

  const shareLabel = shareCopied ? "\u2713 Link Copied" : "Copy Share Link";
  const shareClass = shareCopied ? "btn-secondary sans copied" : "btn-secondary sans";

  return `
    <div class="screen-results">
      <div class="results-wrap">
        <div class="results-header">
          <div class="results-label sans">Your Diagnostic Profile</div>
          <h1 class="results-title">How Scalable Is Your Strategy?</h1>
          <div class="results-subtitle sans">The Invisible Break Diagnostic</div>
          <div class="intro-rule"></div>
          <p class="results-desc">
            Each category shows where your strategic foundations fall on the
            <span style="color:#c44"> Instinct</span> \u2192
            <span style="color:#b68a1a"> Transition</span> \u2192
            <span style="color:#2a7d4f"> System</span> spectrum.
          </p>
        </div>

        ${cardsHtml}

        <div class="print-header">
          <h2>The Invisible Break Diagnostic \u2014 Your Results</h2>
          <p>Carter Reports \u00B7 davidpaulcarter.com</p>
        </div>

        <div class="save-results-cta">
          <h3>Save Your Personal Results</h3>
          <p>Download a PDF of your diagnostic profile with your scores and recommended next steps.</p>
          <button class="btn-save sans" data-action="print-results">Save Results as PDF</button>
        </div>

        <div class="retake-area">
          <button class="btn-retake sans" data-action="retake">Retake Diagnostic</button>
        </div>

        <div class="footer">
          \u00A9 Carter Reports \u2014 The Invisible Break Diagnostic
        </div>
      </div>
    </div>`;
}

// ---- EVENT BINDING ----
function bindEvents() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", handleAction);
  });
}

function handleAction(e) {
  const btn = e.currentTarget;
  const action = btn.dataset.action;

  if (action === "start") {
    phase = "questions";
    render();
  }
  else if (action === "answer") {
    const val = parseInt(btn.dataset.value);
    const cat = CATEGORIES[currentCat];
    const q = cat.questions[currentQ];
    answers[q.id] = val;

    // Animate out
    const content = document.getElementById("qContent");
    if (content) {
      content.classList.add("animating");
      setTimeout(() => {
        if (currentQ < 2) currentQ++;
        else if (currentCat < 3) { currentCat++; currentQ = 0; }
        else { phase = "results"; }
        render();
      }, 350);
    }
  }
  else if (action === "back") {
    if (currentQ > 0) currentQ--;
    else if (currentCat > 0) { currentCat--; currentQ = 2; }
    render();
  }
  else if (action === "submit-email") {
    const input = document.getElementById("emailInput");
    if (input && input.value && input.value.includes("@")) {
      emailSubmitted = true;
      render();
    }
  }
  else if (action === "share") {
    const url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => {
        shareCopied = true;
        render();
        setTimeout(() => { shareCopied = false; render(); }, 3000);
      });
    } else {
      shareCopied = true;
      render();
      setTimeout(() => { shareCopied = false; render(); }, 3000);
    }
  }
  else if (action === "retake") {
    phase = "intro";
    currentCat = 0;
    currentQ = 0;
    answers = {};
    emailSubmitted = false;
    shareCopied = false;
    render();
  }
  else if (action === "print-results") {
    window.print();
  }
}

// ---- INIT ----
render();
</script>
</body>
</html>
